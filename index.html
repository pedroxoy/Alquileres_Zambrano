<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recibo de Alquileres Zambrano</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .campo { margin-bottom: 10px; }
    label { font-weight: bold; }
    input, select, textarea { width: 100%; padding: 5px; }
    textarea { height: 60px; }
    button { margin-top: 10px; padding: 8px 12px; }
    .servicios label { font-weight: normal; margin-right: 15px; }
  </style>
</head>
<body>
  <h2><b>Recibo de Pago - Alquileres Zambrano</b></h2>
  <form id="formRecibo">
    <div class="campo">
      <label>Fecha:</label>
      <input type="date" id="fecha" required>
    </div>
    <div class="campo">
      <label>Nombre del Inquilino:</label>
      <input type="text" id="inquilino" required>
    </div>
    <div class="campo">
      <label>Periodo de pago:</label>
      <input type="text" id="periodo" placeholder="Ej. Enero 2026" required>
    </div>
    <div class="campo">
      <label>Monto de alquiler (Q):</label>
      <input type="number" id="monto" required>
    </div>
    <div class="campo">
      <label>Total pagado (Q):</label>
      <input type="number" id="total" required>
    </div>
    <div class="campo">
      <label>Forma de pago:</label>
      <select id="pago">
        <option>Efectivo</option>
        <option>Transferencia</option>
        <option>Depósito</option>
      </select>
    </div>
    <div class="campo servicios">
      <label>Servicios incluidos:</label><br>
      <label><input type="checkbox" id="luz"> Luz</label>
      <label><input type="checkbox" id="agua"> Agua</label>
      <label><input type="checkbox" id="basura"> Extracción de basura</label>
    </div>
    <div class="campo">
      <label>Observaciones:</label>
      <textarea id="obs"></textarea>
    </div>
    <button type="submit">Generar Recibo PDF</button>
  </form>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    document.getElementById("formRecibo").addEventListener("submit", function(e){
      e.preventDefault();
      const fecha = document.getElementById("fecha").value;
      const inquilino = document.getElementById("inquilino").value;
      const periodo = document.getElementById("periodo").value;
      const monto = document.getElementById("monto").value;
      const total = document.getElementById("total").value;
      const pago = document.getElementById("pago").value;
      const obs = document.getElementById("obs").value;

      // Servicios en una sola línea
      const luz = document.getElementById("luz").checked ? "Luz: Sí" : "Luz: No";
      const agua = document.getElementById("agua").checked ? "Agua: Sí" : "Agua: No";
      const basura = document.getElementById("basura").checked ? "Basura: Sí" : "Basura: No";
      const serviciosLinea = luz + "     " + agua + "     " + basura;

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      // Encabezado
      doc.setFont("times", "bold");
      doc.setFontSize(14);
      doc.text("ALQUILERES ZAMBRANO", 20, 20);
      doc.setFont("helvetica", "normal");
      doc.text("Diagonal 5, 3-05 Zona 7, Residenciales Imperial", 20, 30);
      doc.text("Tel: 5714 4147", 20, 40);

      // Título principal
      doc.setFont("helvetica", "bold");
      doc.setFontSize(16);
      doc.text("RECIBO DE PAGO DE ALQUILER", 50, 55);

      // Subtítulos en negrita
      doc.setFont("helvetica", "bold");
      doc.setFontSize(12);
      doc.text("Fecha:", 20, 70);
      doc.text("Nombre:", 20, 80);
      doc.text("Periodo:", 20, 90);
      doc.text("Monto alquiler:", 20, 100);
      doc.text("Total pagado:", 20, 110);
      doc.text("Forma de pago:", 20, 120);
      doc.text("Servicios incluidos:", 20, 130);
      doc.text("Observaciones:", 20, 150);
      doc.text("Firma:", 20, 180);

      // Valores normales
      doc.setFont("helvetica", "normal");
      doc.text(fecha, 60, 70);
      doc.text(inquilino, 60, 80);
      doc.text(periodo, 60, 90);
      doc.text("Q" + monto, 60, 100);
      doc.text("Q" + total, 60, 110);
      doc.text(pago, 60, 120);
      doc.text(serviciosLinea, 60, 130);
      doc.text(obs, 60, 160);

      doc.text("_____________________", 60, 180);

      doc.save("Recibo_" + inquilino + "_" + fecha + ".pdf");
    });
  </script>
</body>
</html>
